<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - 日志</title>
  <link rel="icon" href="/favicon.ico?v={{APP_VERSION}}">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/static/css/app.css?v={{APP_VERSION}}" rel="stylesheet">
  <style>
    body { background:#FAF9F5 }
    .page-hd { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px }
    .page-title { font-size:22px; font-weight:700; line-height:1.2 }
    .page-sub { font-size:13px; color:var(--fg-muted); margin-top:5px }
    .page-actions { display:flex; gap:8px; align-items:center }
    .page-action-btn {
      height:32px; padding:0 14px; border-radius:999px;
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      font-size:13px; font-weight:600; border:1px solid #e6e6e6;
      background:#fafafa; color:#444;
    }
    .page-action-btn:hover { background:#f3f3f3; border-color:#dcdcdc }
    .filters {
      display:grid;
      grid-template-columns: minmax(180px, 240px) minmax(140px, 180px) minmax(120px, 140px) 1fr;
      gap:10px;
      margin-bottom:14px;
    }
    .filters .input { height:34px }
    .table-card {
      background:#fff;
      border-radius:14px;
      overflow:hidden;
      box-shadow:none;
    }
    table { width:100%; border-collapse:collapse }
    th, td { padding:12px 14px; border-bottom:1px solid #f3f3f3; vertical-align:top; text-align:left }
    th { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#8a8a8a; font-weight:700 }
    td { font-size:12px; color:#333 }
    .log-level {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:52px; height:22px; padding:0 8px; border-radius:999px;
      font-size:11px; font-weight:700; background:#f5f5f5; color:#555;
    }
    .log-level.ERROR, .log-level.CRITICAL { background:#fff0ee; color:#c2410c }
    .log-level.WARNING { background:#fff7ed; color:#c2410c }
    .log-level.INFO { background:#eff6ff; color:#2563eb }
    .log-source { color:#7a7a7a; font-size:11px; white-space:nowrap }
    .log-message {
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.45;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:11.5px;
    }
    .empty-state { padding:28px 16px; text-align:center; color:#8a8a8a; font-size:13px }
    @media (max-width: 900px) {
      .filters { grid-template-columns:1fr 1fr; }
    }
    @media (max-width: 640px) {
      .page-hd { flex-direction:column; }
      .filters { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div id="admin-header" data-active="/admin/logs"></div>
<main class="admin-main">
  <div class="page-hd">
    <div>
      <div class="page-title">日志</div>
      <div class="page-sub">查看文件日志，按级别或关键字筛选最近错误。</div>
    </div>
    <div class="page-actions">
      <button type="button" class="page-action-btn" onclick="loadLogs()">刷新</button>
    </div>
  </div>

  <div class="filters">
    <select id="file-sel" class="input" onchange="loadLogs()">
      <option value="">全部文件</option>
    </select>
    <select id="level-sel" class="input" onchange="loadLogs()">
      <option value="">全部级别</option>
      <option value="ERROR">ERROR</option>
      <option value="WARNING">WARNING</option>
      <option value="INFO">INFO</option>
      <option value="DEBUG">DEBUG</option>
    </select>
    <select id="limit-sel" class="input" onchange="loadLogs()">
      <option value="100">最近 100 条</option>
      <option value="200" selected>最近 200 条</option>
      <option value="500">最近 500 条</option>
    </select>
    <input id="query-input" class="input" placeholder="关键字 / token / route / model" onkeydown="if(event.key==='Enter') loadLogs()">
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:170px">时间</th>
          <th style="width:80px">级别</th>
          <th style="width:160px">文件</th>
          <th style="width:220px">来源</th>
          <th>内容</th>
        </tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>
</main>

<script src="/static/js/auth.js?v={{APP_VERSION}}"></script>
<script src="/static/js/admin-header.js?v={{APP_VERSION}}"></script>
<script src="/static/js/toast.js?v={{APP_VERSION}}"></script>
<script src="/static/js/footer.js?v={{APP_VERSION}}"></script>
<script>
const state = { files: [] };

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function api(path) {
  const key = await adminKey.get();
  const res = await fetch(ADMIN_API + path, {
    headers: { Authorization: `Bearer ${key}` },
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.detail || res.statusText || String(res.status));
  }
  return res.json();
}

function renderFiles(files) {
  const sel = document.getElementById('file-sel');
  const current = sel.value;
  sel.innerHTML = ['<option value="">全部文件</option>', ...files.map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`)].join('');
  if (current && files.includes(current)) sel.value = current;
}

function renderLogs(items) {
  const body = document.getElementById('log-body');
  if (!items.length) {
    body.innerHTML = '<tr><td colspan="5" class="empty-state">没有匹配日志</td></tr>';
    return;
  }
  body.innerHTML = items.map((item) => `
    <tr>
      <td>${escapeHtml(item.timestamp || '-')}</td>
      <td><span class="log-level ${escapeHtml((item.level || '').toUpperCase())}">${escapeHtml(item.level || '-')}</span></td>
      <td>${escapeHtml(item.file || '-')}</td>
      <td><div class="log-source">${escapeHtml(item.source || '-')}</div></td>
      <td><div class="log-message">${escapeHtml(item.message || item.raw || '')}</div></td>
    </tr>
  `).join('');
}

async function loadLogs() {
  try {
    const file = document.getElementById('file-sel').value;
    const level = document.getElementById('level-sel').value;
    const limit = document.getElementById('limit-sel').value;
    const q = document.getElementById('query-input').value.trim();
    const params = new URLSearchParams();
    if (file) params.set('file', file);
    if (level) params.set('level', level);
    if (limit) params.set('limit', limit);
    if (q) params.set('q', q);
    const data = await api('/logs' + (params.toString() ? `?${params.toString()}` : ''));
    state.files = Array.isArray(data.files) ? data.files : [];
    renderFiles(state.files);
    renderLogs(Array.isArray(data.items) ? data.items : []);
  } catch (error) {
    showToast(error.message || String(error), 'error');
  }
}

(async () => {
  await renderAdminHeader?.();
  await renderSiteFooter?.();
  const key = await adminKey.get();
  if (!key || !await verifyKey(ADMIN_API + '/verify', key).catch(() => false)) {
    location.href = '/admin/login';
    return;
  }
  await loadLogs();
})();
</script>
</body>
</html>
