<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - 调用历史</title>
  <link rel="icon" href="/favicon.ico?v={{APP_VERSION}}">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/static/css/app.css?v={{APP_VERSION}}" rel="stylesheet">
  <style>
    body { background:#FAF9F5 }
    .page-hd { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px }
    .page-title { font-size:22px; font-weight:700; line-height:1.2 }
    .page-sub { font-size:13px; color:var(--fg-muted); margin-top:5px }
    .page-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap }
    .page-action-btn {
      height:32px; padding:0 14px; border-radius:999px;
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      font-size:13px; font-weight:600; border:1px solid #e6e6e6;
      background:#fafafa; color:#444;
    }
    .page-action-btn:hover { background:#f3f3f3; border-color:#dcdcdc }
    .page-action-btn-primary { background:#111; border-color:#111; color:#fff }
    .page-action-btn-primary:hover { background:#222; border-color:#222 }
    .filters {
      display:grid;
      grid-template-columns: minmax(140px, 1fr) minmax(140px, 1fr) minmax(120px, 160px) minmax(120px, 160px) minmax(140px, 180px) 1fr;
      gap:10px;
      margin-bottom:14px;
    }
    .filters .input { height:34px }
    .table-card {
      background:#fff;
      border-radius:14px;
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      box-shadow:none;
    }
    .table-card > table { width:max-content; min-width:100%; border-collapse:collapse }
    th, td { padding:12px 14px; border-bottom:1px solid #f3f3f3; vertical-align:top; text-align:left }
    th { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#8a8a8a; font-weight:700 }
    td { font-size:12px; color:#333; max-width:320px; word-break:break-word }
    .badge {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:52px; height:22px; padding:0 8px; border-radius:999px;
      font-size:11px; font-weight:700; background:#f5f5f5; color:#555;
    }
    .badge.success { background:#ecfdf5; color:#059669 }
    .badge.failed { background:#fef2f2; color:#dc2626 }
    .badge.stream { background:#eff6ff; color:#2563eb }
    .badge.non-stream { background:#faf5ff; color:#7c3aed }
    .token-summary { white-space:nowrap; font-variant-numeric:tabular-nums; color:#555 }
    .call-route { font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:11.5px; color:#666 }
    .call-error {
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.45;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:11.5px;
    }
    .action-link {
      height:28px; padding:0 10px; border-radius:999px;
      border:1px solid #e6e6e6; background:#fafafa; color:#444;
      font-size:12px; font-weight:600;
    }
    .action-link:hover { background:#f3f3f3; border-color:#dcdcdc }
    .empty-state { padding:28px 16px; text-align:center; color:#8a8a8a; font-size:13px }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.28); display:none; align-items:center; justify-content:center; padding:16px; z-index:1000 }
    .modal-overlay.open { display:flex }
    .modal { background:#fff; border-radius:18px; width:min(900px, 100%); max-height:min(90vh, 900px); overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.18); display:flex; flex-direction:column }
    .modal-head { padding:16px 18px; border-bottom:1px solid #f1f1f1; display:flex; align-items:flex-start; justify-content:space-between; gap:12px }
    .modal-title { font-size:16px; font-weight:700 }
    .modal-sub { margin-top:4px; font-size:12px; color:#888 }
    .modal-body { padding:16px 18px 18px; overflow:auto; display:grid; gap:14px }
    .modal-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:12px }
    .modal-card { border:1px solid #eee; border-radius:14px; padding:12px; background:#fbfbfb; min-width:0 }
    .modal-card-title { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#888; font-weight:700; margin-bottom:8px }
    .modal-code {
      white-space:pre-wrap;
      word-break:break-word;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:11.5px;
      line-height:1.5;
      color:#222;
      max-height:280px;
      overflow:auto;
    }
    .detail-kv { display:grid; grid-template-columns:140px minmax(0,1fr); gap:8px 12px; font-size:12px; color:#444 }
    .detail-kv .k { color:#8a8a8a }
    .modal-footer { padding:14px 18px 18px; display:flex; justify-content:flex-end; border-top:1px solid #f1f1f1 }
    @media (max-width: 960px) {
      .filters { grid-template-columns:1fr 1fr; }
      .modal-grid { grid-template-columns:1fr; }
    }
    @media (max-width: 640px) {
      .page-hd { flex-direction:column; }
      .filters { grid-template-columns:1fr; }
      .detail-kv { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div id="admin-header" data-active="/admin/calls"></div>
<main class="admin-main">
  <div class="page-hd">
    <div>
      <div class="page-title">调用历史</div>
      <div class="page-sub">记录模型调用时间、模型名、路由、耗时、流式状态、成功失败、token 用量与错误信息。</div>
    </div>
    <div class="page-actions">
      <button type="button" class="page-action-btn" onclick="loadCalls()">刷新</button>
      <button type="button" class="page-action-btn page-action-btn-primary" onclick="document.getElementById('query-input').focus()">搜索</button>
    </div>
  </div>

  <div class="filters">
    <input id="query-input" class="input" placeholder="模型 / 路由 / 错误 / 预览" onkeydown="if(event.key==='Enter') loadCalls()">
    <input id="model-input" class="input" placeholder="模型名">
    <input id="route-input" class="input" placeholder="路由">
    <select id="status-sel" class="input" onchange="loadCalls()">
      <option value="">全部状态</option>
      <option value="success">成功</option>
      <option value="failed">失败</option>
    </select>
    <select id="stream-sel" class="input" onchange="loadCalls()">
      <option value="">全部流式</option>
      <option value="true">流式</option>
      <option value="false">非流式</option>
    </select>
    <select id="limit-sel" class="input" onchange="loadCalls()">
      <option value="25">最近 25 条</option>
      <option value="50" selected>最近 50 条</option>
      <option value="100">最近 100 条</option>
    </select>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:170px">时间</th>
          <th style="width:160px">模型</th>
          <th style="width:160px">路由</th>
          <th style="width:86px">流式</th>
          <th style="width:120px">耗时 / Token</th>
          <th style="width:90px">状态</th>
          <th style="width:220px">错误</th>
          <th style="width:170px">IP</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="call-body"></tbody>
    </table>
  </div>
</main>

<div class="modal-overlay" id="call-modal" onclick="if(event.target===this) closeCallModal()">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="call-modal-title">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="call-modal-title">调用详情</div>
        <div class="modal-sub" id="call-modal-sub"></div>
      </div>
      <button type="button" class="action-link" onclick="closeCallModal()">关闭</button>
    </div>
    <div class="modal-body">
      <div class="detail-kv" id="call-modal-meta"></div>
      <div class="modal-grid">
        <div class="modal-card">
          <div class="modal-card-title">Request</div>
          <div class="modal-code" id="call-modal-request"></div>
        </div>
        <div class="modal-card">
          <div class="modal-card-title">Response</div>
          <div class="modal-code" id="call-modal-response"></div>
        </div>
      </div>
      <div class="modal-card" id="call-modal-error-wrap" style="display:none">
        <div class="modal-card-title">Error</div>
        <div class="modal-code" id="call-modal-error"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="action-link" onclick="closeCallModal()">关闭</button>
    </div>
  </div>
</div>

<script src="/static/js/auth.js?v={{APP_VERSION}}"></script>
<script src="/static/js/admin-header.js?v={{APP_VERSION}}"></script>
<script src="/static/js/toast.js?v={{APP_VERSION}}"></script>
<script src="/static/js/footer.js?v={{APP_VERSION}}"></script>
<script>
const state = { showSensitive: false, items: [] };

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatTime(ms) {
  if (!ms) return '-';
  const d = new Date(ms);
  return d.toLocaleString('zh-CN', { hour12: false });
}

function formatTokenSummary(item) {
  return item.token_summary || '-';
}

async function api(path) {
  const key = await adminKey.get();
  const res = await fetch(ADMIN_API + path, {
    headers: { Authorization: `Bearer ${key}` },
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.detail || data.error?.message || res.statusText || String(res.status));
  }
  return res.json();
}

function renderCalls(items) {
  const body = document.getElementById('call-body');
  if (!items.length) {
    body.innerHTML = '<tr><td colspan="9" class="empty-state">没有匹配调用历史</td></tr>';
    return;
  }
  body.innerHTML = items.map((item) => {
    const action = state.showSensitive
      ? `<button type="button" class="action-link" onclick="openCallModal('${escapeHtml(item.id)}')">详情</button>`
      : '<span style="color:#aaa">-</span>';
    const ip = state.showSensitive ? escapeHtml(item.client_ip || '-') : '<span style="color:#aaa">隐藏</span>';
    return `
      <tr>
        <td>${escapeHtml(formatTime(item.created_at_ms))}</td>
        <td>${escapeHtml(item.model || '-')}</td>
        <td><div class="call-route">${escapeHtml(item.route || '-')}</div></td>
        <td><span class="badge ${item.stream ? 'stream' : 'non-stream'}">${item.stream ? '流' : '非流'}</span></td>
        <td><div class="token-summary">${escapeHtml(formatTokenSummary(item))}</div></td>
        <td><span class="badge ${item.success ? 'success' : 'failed'}">${item.success ? '成功' : '失败'}</span></td>
        <td><div class="call-error">${escapeHtml(item.error_message || item.error_type || '-')}</div></td>
        <td>${ip}</td>
        <td>${action}</td>
      </tr>
    `;
  }).join('');
}

async function loadCalls() {
  try {
    const params = new URLSearchParams();
    const q = document.getElementById('query-input').value.trim();
    const model = document.getElementById('model-input').value.trim();
    const route = document.getElementById('route-input').value.trim();
    const status = document.getElementById('status-sel').value;
    const stream = document.getElementById('stream-sel').value;
    const limit = document.getElementById('limit-sel').value;
    if (q) params.set('q', q);
    if (model) params.set('model', model);
    if (route) params.set('route', route);
    if (status) params.set('status', status);
    if (stream) params.set('stream', stream);
    if (limit) params.set('page_size', limit);
    params.set('page', '1');
    const data = await api('/calls' + (params.toString() ? `?${params.toString()}` : ''));
    state.showSensitive = !!data.show_sensitive;
    state.items = Array.isArray(data.items) ? data.items : [];
    renderCalls(state.items);
  } catch (error) {
    showToast(error.message || String(error), 'error');
  }
}

async function openCallModal(callId) {
  try {
    const data = await api(`/calls/${encodeURIComponent(callId)}`);
    document.getElementById('call-modal-title').textContent = `${data.model || '-'} · ${data.route || '-'}`;
    document.getElementById('call-modal-sub').textContent = `${formatTime(data.created_at_ms)} · ${data.token_summary || '-'}`;
    const meta = document.getElementById('call-modal-meta');
    meta.innerHTML = [
      ['状态', data.success ? '成功' : '失败'],
      ['流式', data.stream ? '流式' : '非流式'],
      ['耗时', data.token_summary || '-'],
      ['IP', data.client_ip || '-'],
      ['模型', data.model || '-'],
      ['路由', data.route || '-'],
      ['Token', `${data.prompt_tokens ?? '—'} / ${data.completion_tokens ?? '—'} / ${data.total_tokens ?? '—'}`],
    ].map(([k, v]) => `<div class="k">${escapeHtml(k)}</div><div>${escapeHtml(v)}</div>`).join('');
    document.getElementById('call-modal-request').textContent = data.request_text || data.request_preview || '-';
    document.getElementById('call-modal-response').textContent = data.response_text || data.response_preview || '-';
    const errorWrap = document.getElementById('call-modal-error-wrap');
    const errorBody = document.getElementById('call-modal-error');
    if (data.error_message) {
      errorWrap.style.display = '';
      errorBody.textContent = data.error_message;
    } else {
      errorWrap.style.display = 'none';
      errorBody.textContent = '';
    }
    document.getElementById('call-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  } catch (error) {
    showToast(error.message || String(error), 'error');
  }
}

function closeCallModal() {
  document.getElementById('call-modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') closeCallModal();
});

(async () => {
  await renderAdminHeader?.();
  await renderSiteFooter?.();
  const key = await adminKey.get();
  if (!key || !await verifyKey(ADMIN_API + '/verify', key).catch(() => false)) {
    location.href = '/admin/login';
    return;
  }
  await loadCalls();
})();
</script>
</body>
</html>
